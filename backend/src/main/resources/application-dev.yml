spring:
  datasource:
    url: jdbc:h2:mem:jobportal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: dev-secret-key-that-is-at-least-32-characters-long-for-hs256
    refresh-secret: dev-refresh-secret-key-that-is-at-least-32-characters-long

logging:
  level:
    com.jobportal: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,env,metrics
