spring:
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    show-sql: false

server:
  tomcat:
    max-connections: 200
    accept-count: 50

logging:
  level:
    com.jobportal: WARN
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
